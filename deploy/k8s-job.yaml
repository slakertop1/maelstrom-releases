# One-off load test as a Kubernetes Job. The load originates from a pod inside
# the cluster (allowed to reach prod), not a laptop.
#
#   1. Put your exported scenario JSON into the ConfigMap below (or mount it).
#   2. Put secrets (client_secret, tokens) into the Secret and reference them in
#      the scenario JSON as ${OAUTH_CLIENT_SECRET} — the CLI expands ${ENV}.
#   3. kubectl apply -f k8s-job.yaml
#   4. kubectl logs job/maelstrom-loadtest -f   # exit code gates the Job
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: maelstrom-scenario
data:
  scenario.json: |
    {
      "name": "orders-service",
      "duration_secs": 120,
      "timeout_ms": 10000,
      "targets": [
        { "name": "list-orders", "method": "GET", "url": "https://orders.internal.example.com/v1/orders", "rps": 200,
          "auth_refresh": { "grant_type": "client_credentials", "token_url": "https://idp.internal.example.com/oauth/token",
                            "client_id": "loadtest", "client_secret": "${OAUTH_CLIENT_SECRET}", "client_auth": "body" } },
        { "name": "create-order", "method": "POST", "url": "https://orders.internal.example.com/v1/orders", "rps": 50,
          "headers": [["Content-Type", "application/json"]], "body": "{\"item\":\"sku-1\",\"qty\":1}",
          "auth_refresh": { "grant_type": "client_credentials", "token_url": "https://idp.internal.example.com/oauth/token",
                            "client_id": "loadtest", "client_secret": "${OAUTH_CLIENT_SECRET}", "client_auth": "body" } }
      ],
      "thresholds": { "max_error_rate": 1.0, "max_p95_ms": 400 }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: maelstrom-secrets
type: Opaque
stringData:
  OAUTH_CLIENT_SECRET: "replace-me"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: maelstrom-loadtest
spec:
  backoffLimit: 0            # a threshold breach (exit 1) fails the Job; don't retry
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: maelstrom
          image: ghcr.io/slakertop1/maelstrom-cli:latest   # published by CI to GHCR
          args:
            - /config/scenario.json
            - --out-json
            - /reports/report.json
            - --out-html
            - /reports/report.html
          envFrom:
            - secretRef:
                name: maelstrom-secrets
          resources:
            requests: { cpu: "500m", memory: "256Mi" }
            limits:   { cpu: "2",    memory: "512Mi" }
          volumeMounts:
            - { name: scenario, mountPath: /config }
            - { name: reports,  mountPath: /reports }
      volumes:
        - name: scenario
          configMap:
            name: maelstrom-scenario
        - name: reports
          emptyDir: {}          # swap for a PVC / artifact sidecar to keep the HTML report
